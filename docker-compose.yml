services:
  # XHS Agent 应用 (复用宿主机 Ollama + Chroma)
  app:
    build: .
    container_name: xhs-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./.env:/app/.env:ro
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - XHS_AGENT_DB_PATH=/app/data/xhs_agent.db
      - XHS_AGENT_DATA_DIR=/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "src.main", "serve", "start"]
    restart: unless-stopped
