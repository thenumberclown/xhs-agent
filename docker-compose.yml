version: "3.8"

services:
  # Ollama 服务 - 本地大模型推理
  ollama:
    image: ollama/ollama:latest
    container_name: xhs-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Chroma 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: xhs-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # 应用服务 (开发阶段用 volume 挂载，生产构建镜像)
  app:
    build: .
    container_name: xhs-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./.env:/app/.env:ro
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=http://chroma:8000
      - XHS_AGENT_DB_PATH=/app/data/xhs_agent.db
      - XHS_AGENT_DATA_DIR=/app/data
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_started
    command: ["python", "-m", "src.main", "serve"]
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
